# fly.toml app configuration file generated for fiber-merchant-kit-zynorr on 2026-07-08T20:11:34+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fiber-merchant-kit-zynorr'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DISABLE_RATE_LIMIT = 'true'
  EXPOSE_DEMO_KEY = 'true'
  FIBER_MERCHANT_DB_PATH = '/data/merchant.db'
  FIBER_NODE_RPC_URL = 'demo'
  NODE_ENV = 'development'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
