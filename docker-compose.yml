services:
  api:
    build:
      context: .
      target: api
    env_file:
      - .env.production
    environment:
      FIBER_MERCHANT_DB_PATH: /data/merchant.db
    ports:
      - "3001:3001"
    volumes:
      - merchant-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: fiber_merchant
      POSTGRES_USER: fiber
      POSTGRES_PASSWORD: fiber_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/postgres-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    restart: unless-stopped

volumes:
  merchant-data:
  postgres-data:
